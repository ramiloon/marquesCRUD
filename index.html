<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="estilos.css">
    <title>CRUD</title>
</head>

<body>
    <div class="container mt-5">
        <h1 class="mb-4 text-center">Inscripción a lo que sea</h1>
    </div>

    <div>
        <div class="mb-3">
            <label for="nombrePersona">Nombre de la persona:</label>
            <input type="text" id="nombrePersona" placeholder="Tu nombre aquí">
        </div>

        <div class="mb-3">
            <label for="actividadSeleccionada">Actividad:</label>
            <select id="actividadSeleccionada">
                <option value="">Selecciona una actividad</option>
                <option value="Robotica">Robótica</option>
                <option value="DiseñoWeb">Diseño web</option>
                <option value="Ofimatica">Ofimática</option>
                <option value="Edicion">Edición de video</option>

            </select>
        </div>

        <div class="mb-3">
            <label for="">Turno:</label>

            <input type="radio" name="turnoActividad" id="turnoMañana" value="Mañana">
            <label for="turnoMañana">Mañana</label>

            <input type="radio" name="turnoActividad" id="turnoTarde" value="Tarde">
            <label for="turnoTarde">Tarde</label>
        </div>

        <div class="mb-3">
            <button type="button" id="botonGuardar" class="btn btn-outline-info">Añadir inscripción</button>

        </div>
    </div>

    <div class="container">
        <h2 class="mb-3">Lista de inscripciones</h2>
        <div class="table-responsive">
            <table class="table table-striped table-bordered align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Persona</th>
                        <th>Actividad</th>
                        <th>Turno</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTablaInscripciones">

                </tbody>
            </table>
        </div>
    </div>

    <script src="crud.js"></script>
</body>

</html>
